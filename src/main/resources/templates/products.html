<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Products</title>

  <th:block th:replace="~{fragments/theme :: theme}"></th:block>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark navbar-ocean">
  <div class="container py-2">
    <a class="navbar-brand" th:href="@{/ui/products}">Inventory Management</a>
    <div class="d-flex gap-2">
      <a class="btn btn-ocean-outline btn-sm" th:href="@{/ui/products/add}">+ Add Product</a>
    </div>
  </div>
</nav>

<div class="container py-4" th:with="curPage=${page != null ? page : 0}">

  <div th:if="${msg != null and !#strings.isEmpty(msg)}"
       class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${msg}">Success</span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div th:if="${err != null and !#strings.isEmpty(err)}"
       class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${err}">Error</span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card card-ocean p-4">
    <div class="card-body">

      <form class="row g-2 align-items-center mb-3" method="get" th:action="@{/ui/products}">
       
        <div class="col-6 col-md-2">
          <select class="form-select" name="sortBy">
            <option th:selected="${sortBy == 'id'}" value="id">Sort : ID</option>
            <option th:selected="${sortBy == 'sku'}" value="sku">Sort : SKU</option>
            <option th:selected="${sortBy == 'name'}" value="name">Sort : Name</option>
            <option th:selected="${sortBy == 'quantity'}" value="quantity">Sort : Qty</option>
            <option th:selected="${sortBy == 'price'}" value="price">Sort : Price</option>
          </select>
        </div>
         
        <div class="col-6 col-md-2">
          <select class="form-select" name="size">
            <option th:selected="${size == 10}" value="10">10 per page</option>
            <option th:selected="${size == 20}" value="20">20 per page</option>
            <option th:selected="${size == 50}" value="50">50 per page</option>
          </select>
        </div>

 	<div class="col-12 col-md-6">
          <input class="form-control" name="query" placeholder="Search by SKU or Name" th:value="${query}" required=true>
        </div>
        
        <div class="col-12 col-md-2 d-grid">
          <button class="btn btn-ocean" type="submit">Search</button>
        </div>
        
        <div class="col-12 col-md-2 d-grid">
 		 <a class="btn btn-outline-secondary" th:href="@{/ui/products}">Reset</a>
		</div>

        <input type="hidden" name="sortDir" th:value="${sortDir}">
        <input type="hidden" name="page" value="0">
      </form>

      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>SKU</th>
              <th>Name</th>
              <th class="text-end">Qty</th>
              <th class="text-end">Price</th>
              <th>Description</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr th:if="${result == null or result.productList == null or #lists.isEmpty(result.productList)}">
              <td colspan="7" class="text-center text-muted py-4">No products found</td>
            </tr>

            <tr th:each="p : ${result.productList}">
              <td th:text="${p.id}">1</td>
              <td><span class="badge text-bg-secondary" th:text="${p.sku}">SKU</span></td>
              <td th:text="${p.name}">Name</td>
              <td class="text-end" th:text="${p.quantity}">0</td>
              <td class="text-end" th:text="${p.price}">0.00</td>
              <td class="text-truncate" style="max-width: 260px;" th:text="${p.description}">-</td>

              <td class="text-end">
                <div class="btn-group btn-group-sm" role="group">
                  <a class="btn btn-ocean-outline me-2" th:href="@{|/ui/products/${p.id}/edit|}">Edit</a>
                  <a class="btn btn btn-ocean-outline btn-outline-secondary me-2" th:href="@{|/ui/products/${p.id}/stock|}">Stock</a>

                  <form th:action="@{|/ui/products/${p.id}/delete|}" method="post"
                        onsubmit="return confirm('Delete this product?');" style="display:inline;">
                    <button class="btn btn-ocean-outline btn-outline-danger" type="submit">Delete</button>
                  </form>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="d-flex justify-content-between align-items-center mt-3"
           th:if="${result != null and result.totalPages != null and result.totalPages > 0}">

        <div class="text-muted small">
          Total: <span th:text="${result.totalElements}">0</span>
        </div>

        <div class="btn-group">
          <a class="btn btn-outline-dark btn-sm"
             th:classappend="${curPage == 0} ? 'disabled' : ''"
             th:href="@{/ui/products(query=${query}, page=${curPage-1}, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}">
            Prev
          </a>

          <span class="btn btn-outline-dark btn-sm disabled">
            Page <span th:text="${curPage + 1}">1</span> / <span th:text="${result.totalPages}">1</span>
          </span>

          <a class="btn btn-outline-dark btn-sm"
             th:classappend="${result.last} ? 'disabled' : ''"
             th:href="@{/ui/products(query=${query}, page=${curPage+1}, size=${size}, sortBy=${sortBy}, sortDir=${sortDir})}">
            Next
          </a>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

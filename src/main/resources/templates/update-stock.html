<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Update Stock</title>

  <th:block th:replace="~{fragments/theme :: theme}"></th:block>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark navbar-ocean">
  <div class="container py-2">
    <a class="navbar-brand" th:href="@{/ui/products}">Inventory Management</a>
  </div>
</nav>

<div class="container py-4">
  <div class="card card-ocean">
    <div class="card-body">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Update Stock</h4>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/ui/products}">Back</a>
      </div>

      <div class="mb-3">
        <div class="text-muted small">Product</div>
        <div class="fw-semibold">
          <span class="badge text-bg-secondary" th:text="${product.sku}">SKU</span>
          <span th:text="${product.name}">Name</span>
        </div>
        <div class="text-muted small">
          Current quantity: <span class="fw-semibold" th:text="${product.quantity}">0</span>
        </div>
      </div>

      <form class="row g-2 align-items-end">
        <div class="col-12 col-md-4">
          <label class="form-label" for="qty">Quantity</label>
          <input id="qty" type="number" name="qty" min="1" value="1" class="form-control">
        </div>

        <div class="col-12 col-md-8 d-flex gap-2">
          <button class="btn btn-ocean"
                  th:formaction="@{|/ui/products/${product.id}/stock/in|}"
                  formmethod="post" type="submit">
            Stock In
          </button>

          <button class="btn btn-soft btn-outline-primary"
                  th:formaction="@{|/ui/products/${product.id}/stock/out|}"
                  formmethod="post" type="submit">
            Stock Out
          </button>

          <a class="btn btn-outline-secondary ms-auto" th:href="@{/ui/products}">Cancel</a>
        </div>
      </form>

      <div class="mt-3 small text-muted">
        Tip: Stock Out should fail if quantity goes below 0 (depending on your service logic).
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

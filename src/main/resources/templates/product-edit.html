<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Product</title>

  <th:block th:replace="~{fragments/theme :: theme}"></th:block>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark navbar-ocean">
  <div class="container py-2">
    <a class="navbar-brand" th:href="@{/ui/products}">Inventory Management</a>
  </div>
</nav>

<div class="container py-4">
  <div class="card card-ocean">
    <div class="card-body">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Edit Product</h4>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/ui/products}">Back</a>
      </div>

      <form method="post" th:action="@{|/ui/products/${id}/edit|}" th:object="${product}">
        <div class="row g-3">

          <div class="col-md-4">
            <label class="form-label" for="sku">SKU</label>
            <input id="sku" type="text" class="form-control" th:field="*{sku}">
            <div class="text-danger small" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></div>
          </div>

          <div class="col-md-8">
            <label class="form-label" for="name">Name</label>
            <input id="name" type="text" class="form-control" th:field="*{name}">
            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
          </div>

          <div class="col-12">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" class="form-control" th:field="*{description}" rows="3"></textarea>
          </div>

          <div class="col-md-6">
            <label class="form-label" for="quantity">Quantity</label>
            <input id="quantity" type="number" min="0" class="form-control" th:field="*{quantity}">
            <div class="text-danger small" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label" for="price">Price</label>
            <input id="price" type="number" step="0.01" min="0" class="form-control" th:field="*{price}">
            <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
          </div>

        </div>

        <div class="mt-4 d-flex gap-2">
          <button class="btn btn-ocean" type="submit">Save</button>
          <a class="btn btn-ocean-outline" th:href="@{/ui/products}">Cancel</a>
        </div>
      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
